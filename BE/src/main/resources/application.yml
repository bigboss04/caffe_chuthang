server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: cafe-shop-api

  # H2 Database (Development)
  datasource:
    url: jdbc:h2:mem:cafeshopdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  # Gmail SMTP
  mail:
    host: smtp.gmail.com
    port: 587
    username: tranvandainopro20022004@gmail.com
    password: smxhilmnolggawhu
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enabled: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
        transport:
          protocol: smtp
        debug: false

# CORS Configuration
app:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
  # Admin email to receive order notifications
  admin-email: tranvandainopro20022004@gmail.com

logging:
  level:
    com.cafeshop: DEBUG
    org.springframework.web: INFO
