server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: cafe-shop-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/cafeshop}}
    username: ${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  # Gmail SMTP
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:tranvandainopro20022004@gmail.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enabled: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  h2:
    console:
      enabled: false

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:https://caffe-chuthang.vercel.app,https://*.vercel.app,http://localhost:5173,http://localhost:5175}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
  admin-email: ${ADMIN_EMAIL:tranvandainopro20022004@gmail.com}

logging:
  level:
    com.cafeshop: INFO
    org.springframework.web: WARN
